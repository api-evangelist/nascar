aid: nascar
name: NASCAR
description: NASCAR, the National Association for Stock Car Auto Racing, is a professional auto racing organization that sanctions
  and governs multiple racing series, including the popular NASCAR Cup Series. NASCAR exposes a feed API documented via Swagger
  that delivers race results, standings, schedules, driver and team information, and other motorsport data for partners, broadcasters,
  and fans.
