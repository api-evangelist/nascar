naftiko: 1.0.0-alpha2
info:
  label: NASCAR Feed API — Drivers
  description: 'NASCAR Feed API — Drivers. 2 operations. Lead operation: List drivers by series and season. Self-contained
    Naftiko capability covering one Nascar business surface.'
  tags:
  - Nascar
  - Drivers
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    NASCAR_API_KEY: NASCAR_API_KEY
capability:
  consumes:
  - type: http
    namespace: nascar-drivers
    baseUri: https://feed.nascar.com
    description: NASCAR Feed API — Drivers business capability. Self-contained, no shared references.
    resources:
    - name: api-Driver
      path: /api/Driver
      operations:
      - name: listdrivers
        method: GET
        description: List drivers by series and season
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-DriverSummary
      path: /api/DriverSummary
      operations:
      - name: getdriversummary
        method: GET
        description: Driver performance summary by track type, track, and season
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: nascar-drivers-rest
    port: 8080
    description: REST adapter for NASCAR Feed API — Drivers. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/driver
      name: api-driver
      description: REST surface for api-Driver.
      operations:
      - method: GET
        name: listdrivers
        description: List drivers by series and season
        call: nascar-drivers.listdrivers
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/driversummary
      name: api-driversummary
      description: REST surface for api-DriverSummary.
      operations:
      - method: GET
        name: getdriversummary
        description: Driver performance summary by track type, track, and season
        call: nascar-drivers.getdriversummary
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: nascar-drivers-mcp
    port: 9090
    transport: http
    description: MCP adapter for NASCAR Feed API — Drivers. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-drivers-series-and-season
      description: List drivers by series and season
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: nascar-drivers.listdrivers
      outputParameters:
      - type: object
        mapping: $.
    - name: driver-performance-summary-track-type
      description: Driver performance summary by track type, track, and season
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: nascar-drivers.getdriversummary
      outputParameters:
      - type: object
        mapping: $.
