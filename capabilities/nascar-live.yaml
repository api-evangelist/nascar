naftiko: 1.0.0-alpha2
info:
  label: NASCAR Feed API — Live
  description: 'NASCAR Feed API — Live. 7 operations. Lead operation: On-track activity feed. Self-contained Naftiko capability
    covering one Nascar business surface.'
  tags:
  - Nascar
  - Live
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    NASCAR_API_KEY: NASCAR_API_KEY
capability:
  consumes:
  - type: http
    namespace: nascar-live
    baseUri: https://feed.nascar.com
    description: NASCAR Feed API — Live business capability. Self-contained, no shared references.
    resources:
    - name: api-LiveFeed
      path: /api/LiveFeed
      operations:
      - name: getlivefeed
        method: GET
        description: On-track activity feed
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-LiveFlag
      path: /api/LiveFlag
      operations:
      - name: getliveflag
        method: GET
        description: Flag status updates
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-LivePitData
      path: /api/LivePitData
      operations:
      - name: getlivepitdata
        method: GET
        description: Pit stop information
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-LivePoints
      path: /api/LivePoints
      operations:
      - name: getlivepoints
        method: GET
        description: Current standings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-LiveQualifying
      path: /api/LiveQualifying
      operations:
      - name: getlivequalifying
        method: GET
        description: Qualifying results
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-LiveQualifyingRounds
      path: /api/LiveQualifyingRounds
      operations:
      - name: getlivequalifyingrounds
        method: GET
        description: Round-by-round qualifying
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-LiveStages
      path: /api/LiveStages
      operations:
      - name: getlivestages
        method: GET
        description: Stage results
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: nascar-live-rest
    port: 8080
    description: REST adapter for NASCAR Feed API — Live. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/livefeed
      name: api-livefeed
      description: REST surface for api-LiveFeed.
      operations:
      - method: GET
        name: getlivefeed
        description: On-track activity feed
        call: nascar-live.getlivefeed
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/liveflag
      name: api-liveflag
      description: REST surface for api-LiveFlag.
      operations:
      - method: GET
        name: getliveflag
        description: Flag status updates
        call: nascar-live.getliveflag
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/livepitdata
      name: api-livepitdata
      description: REST surface for api-LivePitData.
      operations:
      - method: GET
        name: getlivepitdata
        description: Pit stop information
        call: nascar-live.getlivepitdata
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/livepoints
      name: api-livepoints
      description: REST surface for api-LivePoints.
      operations:
      - method: GET
        name: getlivepoints
        description: Current standings
        call: nascar-live.getlivepoints
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/livequalifying
      name: api-livequalifying
      description: REST surface for api-LiveQualifying.
      operations:
      - method: GET
        name: getlivequalifying
        description: Qualifying results
        call: nascar-live.getlivequalifying
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/livequalifyingrounds
      name: api-livequalifyingrounds
      description: REST surface for api-LiveQualifyingRounds.
      operations:
      - method: GET
        name: getlivequalifyingrounds
        description: Round-by-round qualifying
        call: nascar-live.getlivequalifyingrounds
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/livestages
      name: api-livestages
      description: REST surface for api-LiveStages.
      operations:
      - method: GET
        name: getlivestages
        description: Stage results
        call: nascar-live.getlivestages
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: nascar-live-mcp
    port: 9090
    transport: http
    description: MCP adapter for NASCAR Feed API — Live. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: track-activity-feed
      description: On-track activity feed
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: nascar-live.getlivefeed
      outputParameters:
      - type: object
        mapping: $.
    - name: flag-status-updates
      description: Flag status updates
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: nascar-live.getliveflag
      outputParameters:
      - type: object
        mapping: $.
    - name: pit-stop-information
      description: Pit stop information
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: nascar-live.getlivepitdata
      outputParameters:
      - type: object
        mapping: $.
    - name: current-standings
      description: Current standings
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: nascar-live.getlivepoints
      outputParameters:
      - type: object
        mapping: $.
    - name: qualifying-results
      description: Qualifying results
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: nascar-live.getlivequalifying
      outputParameters:
      - type: object
        mapping: $.
    - name: round-round-qualifying
      description: Round-by-round qualifying
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: nascar-live.getlivequalifyingrounds
      outputParameters:
      - type: object
        mapping: $.
    - name: stage-results
      description: Stage results
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: nascar-live.getlivestages
      outputParameters:
      - type: object
        mapping: $.
