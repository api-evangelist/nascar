naftiko: 1.0.0-alpha2
info:
  label: NASCAR Feed API — Stats
  description: 'NASCAR Feed API — Stats. 4 operations. Lead operation: Race box scores. Self-contained Naftiko capability
    covering one Nascar business surface.'
  tags:
  - Nascar
  - Stats
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    NASCAR_API_KEY: NASCAR_API_KEY
capability:
  consumes:
  - type: http
    namespace: nascar-stats
    baseUri: https://feed.nascar.com
    description: NASCAR Feed API — Stats business capability. Self-contained, no shared references.
    resources:
    - name: api-stats-boxscore
      path: /api/stats/boxscore
      operations:
      - name: getboxscore
        method: GET
        description: Race box scores
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-stats-report
      path: /api/stats/report
      operations:
      - name: getstatsreport
        method: GET
        description: Download a report by key
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-stats-reports-race_id
      path: /api/stats/reports/{race_id}
      operations:
      - name: liststatsreports
        method: GET
        description: Available reports for a race
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-stats-season
      path: /api/stats/season
      operations:
      - name: getseasonstats
        method: GET
        description: Season averages
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: nascar-stats-rest
    port: 8080
    description: REST adapter for NASCAR Feed API — Stats. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/stats/boxscore
      name: api-stats-boxscore
      description: REST surface for api-stats-boxscore.
      operations:
      - method: GET
        name: getboxscore
        description: Race box scores
        call: nascar-stats.getboxscore
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/stats/report
      name: api-stats-report
      description: REST surface for api-stats-report.
      operations:
      - method: GET
        name: getstatsreport
        description: Download a report by key
        call: nascar-stats.getstatsreport
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/stats/reports/{race-id}
      name: api-stats-reports-race-id
      description: REST surface for api-stats-reports-race_id.
      operations:
      - method: GET
        name: liststatsreports
        description: Available reports for a race
        call: nascar-stats.liststatsreports
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/stats/season
      name: api-stats-season
      description: REST surface for api-stats-season.
      operations:
      - method: GET
        name: getseasonstats
        description: Season averages
        call: nascar-stats.getseasonstats
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: nascar-stats-mcp
    port: 9090
    transport: http
    description: MCP adapter for NASCAR Feed API — Stats. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: race-box-scores
      description: Race box scores
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: nascar-stats.getboxscore
      outputParameters:
      - type: object
        mapping: $.
    - name: download-report-key
      description: Download a report by key
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: nascar-stats.getstatsreport
      outputParameters:
      - type: object
        mapping: $.
    - name: available-reports-race
      description: Available reports for a race
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: nascar-stats.liststatsreports
      outputParameters:
      - type: object
        mapping: $.
    - name: season-averages
      description: Season averages
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: nascar-stats.getseasonstats
      outputParameters:
      - type: object
        mapping: $.
